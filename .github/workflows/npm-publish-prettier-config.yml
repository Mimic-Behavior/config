# This workflow will publish a package on npm when a workflow is dispatched

name: Publish prettier-config

on: workflow_dispatch

permissions:
    id-token: write
    contents: read

jobs:
    publish-npm:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v7
            - uses: pnpm/action-setup@v6
            - uses: actions/setup-node@v6
              with:
                  node-version: 24
                  registry-url: https://registry.npmjs.org/
            - run: pnpm install
            - run: pnpm --filter @mimic-behavior/prettier-config build
            - run: pnpm --filter @mimic-behavior/prettier-config publish --provenance --access public
              env:
                  NODE_AUTH_TOKEN: ${{secrets.npm_token}}
